name: publish

# Builds the sdist + wheel and publishes them to PyPI using PyPI Trusted
# Publishing (OIDC) — no API tokens stored in the repo. See
# https://docs.pypi.org/trusted-publishers/ for the PyPI-side setup that must
# be done once before the first release.
#
# Triggers:
#   - Tag push matching v* (e.g. v0.1.0a0): publishes to real PyPI.
#   - workflow_dispatch with test_pypi=true (default): publishes to TestPyPI
#     for dry-run validation of the release flow.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      test_pypi:
        description: "Publish to TestPyPI instead of PyPI"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Verify tag matches pyproject.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag '$TAG' does not match pyproject.toml version '$PKG'." >&2
            echo "Bump the version in pyproject.toml or retag, then push again." >&2
            exit 1
          fi
          echo "Tag matches package version: $PKG"

      - name: Build sdist and wheel
        run: uv build

      - name: Verify artifacts with twine
        run: uv run --with twine twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.test_pypi
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/ansible-host
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ansible-host
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
