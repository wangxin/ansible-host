name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Set up Python
        run: uv python install 3.12
      - name: Create venv
        run: uv venv --python 3.12
      - name: Install package + dev deps
        run: uv pip install -e ".[dev]"
      - name: Ruff check
        run: uv run ruff check src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        ansible-core: ["2.16.*", "2.17.*", "2.18.*", "2.19.*"]
        exclude:
          # ansible-core 2.16 / 2.17 do not support Python 3.13
          - { python-version: "3.13", ansible-core: "2.16.*" }
          - { python-version: "3.13", ansible-core: "2.17.*" }
          # ansible-core 2.18 / 2.19 dropped Python 3.10 control-node support
          - { python-version: "3.10", ansible-core: "2.18.*" }
          - { python-version: "3.10", ansible-core: "2.19.*" }
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Create venv
        run: uv venv --python ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: uv pip install -e ".[dev]"
      - name: Pin ansible-core to ${{ matrix.ansible-core }}
        run: uv pip install "ansible-core==${{ matrix.ansible-core }}"
      - name: Show resolved versions
        run: |
          uv run python -c "import sys, ansible, ansible_host; print('python:', sys.version); print('ansible-core:', ansible.__version__); print('ansible-host:', ansible_host.__version__)"
      - name: Run tests
        run: uv run pytest -v

